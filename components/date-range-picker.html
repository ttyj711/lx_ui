<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>日期区间选择器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary-color: #1E7E6E;
      --primary-light: rgba(30, 126, 110, 0.12);
      --text-primary: #1A1A1A;
      --text-secondary: #666666;
      --text-tertiary: #999999;
      --text-disabled: #CCCCCC;
      --bg-white: #FFFFFF;
      --bg-gray: #F5F5F5;
      --border-color: #E5E5E5;
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: rgba(0, 0, 0, 0.5);
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .picker-container {
      background: var(--bg-white);
      width: 100%;
      max-width: 414px;
      border-radius: 24px 24px 0 0;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    /* Header */
    .header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border-color);
      position: relative;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      font-size: 24px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .close-btn:active {
      background: var(--bg-gray);
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .header-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .date-display {
      flex: 1;
      background: var(--bg-gray);
      border-radius: 8px;
      padding: 12px 16px;
      text-align: center;
    }

    .date-label {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    .date-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .date-placeholder {
      color: var(--text-tertiary);
    }

    .night-count {
      flex-shrink: 0;
      font-size: 14px;
      color: var(--primary-color);
      font-weight: 500;
      text-align: center;
      min-width: 80px;
    }

    .night-count.unselected {
      color: var(--text-tertiary);
    }

    /* Week Bar */
    .week-bar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 12px 0;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .week-item {
      text-align: center;
      font-size: 14px;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    /* Calendar */
    .calendar-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 16px;
      padding-bottom: calc(16px + var(--safe-area-bottom));
    }

    .month-group {
      margin-bottom: 24px;
    }

    .month-header {
      position: sticky;
      top: 0;
      background: var(--bg-white);
      padding: 8px 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      z-index: 5;
      margin-bottom: 8px;
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--text-primary);
      cursor: pointer;
      border-radius: 50%;
      position: relative;
      transition: all 0.2s;
      font-weight: 500;
    }

    .day:active {
      transform: scale(0.9);
    }

    .day.today {
      color: var(--primary-color);
    }

    .day.today::after {
      content: '今天';
      position: absolute;
      bottom: 2px;
      font-size: 10px;
      color: var(--primary-color);
      font-weight: 400;
    }

    .day.other-month {
      color: var(--text-disabled);
    }

    .day.start-date,
    .day.end-date {
      background: var(--primary-color);
      color: var(--bg-white);
      font-weight: 600;
    }

    .day.in-range {
      background: var(--primary-light);
      border-radius: 0;
    }

    .day.start-date {
      border-radius: 50% 0 0 50%;
    }

    .day.end-date {
      border-radius: 0 50% 50% 0;
    }

    .day.start-date.end-date {
      border-radius: 50%;
    }

    /* Footer */
    .footer {
      padding: 16px 24px;
      padding-bottom: calc(16px + var(--safe-area-bottom));
      border-top: 1px solid var(--border-color);
      background: var(--bg-white);
    }

    .confirm-btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 12px;
      background: var(--text-disabled);
      color: var(--bg-white);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .confirm-btn.active {
      background: var(--primary-color);
      cursor: pointer;
    }

    .confirm-btn.active:active {
      transform: scale(0.98);
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="picker-container">
    <!-- Header -->
    <div class="header">
      <div class="header-top">
        <button class="close-btn" onclick="closePicker()">✕</button>
        <div class="header-title">选择旅程时间</div>
        <div style="width: 32px;"></div>
      </div>

      <div class="header-status">
        <div class="date-display">
          <div class="date-label">开始日期</div>
          <div class="date-value" id="startDisplay">
            <span class="date-placeholder">未选择</span>
          </div>
        </div>

        <div class="night-count unselected" id="nightCount">共 ? 晚</div>

        <div class="date-display">
          <div class="date-label">结束日期</div>
          <div class="date-value" id="endDisplay">
            <span class="date-placeholder">未选择</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Week Bar -->
    <div class="week-bar">
      <div class="week-item">日</div>
      <div class="week-item">一</div>
      <div class="week-item">二</div>
      <div class="week-item">三</div>
      <div class="week-item">四</div>
      <div class="week-item">五</div>
      <div class="week-item">六</div>
    </div>

    <!-- Calendar Scroll -->
    <div class="calendar-scroll" id="calendarContainer"></div>

    <!-- Footer -->
    <div class="footer">
      <button class="confirm-btn" id="confirmBtn" onclick="confirmSelection()">
        确定
      </button>
    </div>
  </div>

  <script>
    // State
    let startDate = null;
    let endDate = null;
    let today = new Date();
    today.setHours(0, 0, 0, 0);

    // Generate calendar for 24 months (12 months before and after today)
    function generateCalendar() {
      const container = document.getElementById('calendarContainer');
      container.innerHTML = '';

      const startMonth = new Date(today);
      startMonth.setMonth(startMonth.getMonth() - 12);

      for (let i = 0; i < 24; i++) {
        const currentMonth = new Date(startMonth);
        currentMonth.setMonth(currentMonth.getMonth() + i);

        const monthGroup = document.createElement('div');
        monthGroup.className = 'month-group';

        // Month header
        const monthHeader = document.createElement('div');
        monthHeader.className = 'month-header';
        monthHeader.textContent = `${currentMonth.getFullYear()}年${currentMonth.getMonth() + 1}月`;
        monthGroup.appendChild(monthHeader);

        // Month grid
        const monthGrid = document.createElement('div');
        monthGrid.className = 'month-grid';

        const firstDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
        const lastDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);
        const startDayOfWeek = firstDay.getDay();

        // Add empty cells for days before the 1st
        for (let j = 0; j < startDayOfWeek; j++) {
          const emptyDay = document.createElement('div');
          emptyDay.className = 'day other-month';
          monthGrid.appendChild(emptyDay);
        }

        // Add actual days
        for (let day = 1; day <= lastDay.getDate(); day++) {
          const dayElement = document.createElement('div');
          dayElement.className = 'day';
          dayElement.textContent = day;

          const dayDate = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), day);
          dayDate.setHours(0, 0, 0, 0);

          // Check if today
          if (dayDate.getTime() === today.getTime()) {
            dayElement.classList.add('today');
          }

          // Store date info
          dayElement.dataset.date = dayDate.toISOString();

          dayElement.addEventListener('click', () => handleDayClick(dayDate));
          monthGrid.appendChild(dayElement);
        }

        monthGroup.appendChild(monthGrid);
        container.appendChild(monthGroup);
      }

      // Scroll to today
      setTimeout(() => {
        const todayElement = document.querySelector('.day.today');
        if (todayElement) {
          todayElement.scrollIntoView({ behavior: 'auto', block: 'center' });
        }
      }, 100);
    }

    function handleDayClick(date) {
      date.setHours(0, 0, 0, 0);

      // State C: Reset if clicking after already selected range
      if (startDate && endDate) {
        startDate = date;
        endDate = null;
      }
      // State A: First click
      else if (!startDate) {
        startDate = date;
      }
      // State B: Second click
      else {
        if (date.getTime() === startDate.getTime()) {
          // Clicking same date, treat as reset
          startDate = date;
          endDate = null;
        } else if (date < startDate) {
          // Reverse selection protection
          startDate = date;
          endDate = null;
        } else {
          // Valid range selection
          endDate = date;
        }
      }

      updateUI();
    }

    function updateUI() {
      // Update header display
      const startDisplay = document.getElementById('startDisplay');
      const endDisplay = document.getElementById('endDisplay');
      const nightCount = document.getElementById('nightCount');
      const confirmBtn = document.getElementById('confirmBtn');

      if (startDate) {
        startDisplay.innerHTML = `${(startDate.getMonth() + 1).toString().padStart(2, '0')}月${startDate.getDate().toString().padStart(2, '0')}日`;
      } else {
        startDisplay.innerHTML = '<span class="date-placeholder">未选择</span>';
      }

      if (endDate) {
        endDisplay.innerHTML = `${(endDate.getMonth() + 1).toString().padStart(2, '0')}月${endDate.getDate().toString().padStart(2, '0')}日`;
      } else {
        endDisplay.innerHTML = '<span class="date-placeholder">未选择</span>';
      }

      // Update night count
      if (startDate && endDate) {
        const diffTime = Math.abs(endDate - startDate);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        nightCount.textContent = `共 ${diffDays} 晚`;
        nightCount.classList.remove('unselected');

        confirmBtn.classList.add('active');
        confirmBtn.textContent = `确定（已选 ${diffDays + 1} 天）`;
      } else if (startDate) {
        nightCount.textContent = '请选择结束日期';
        nightCount.classList.add('unselected');

        confirmBtn.classList.remove('active');
        confirmBtn.textContent = '确定';
      } else {
        nightCount.textContent = '共 ? 晚';
        nightCount.classList.add('unselected');

        confirmBtn.classList.remove('active');
        confirmBtn.textContent = '确定';
      }

      // Update calendar day states
      document.querySelectorAll('.day').forEach(dayElement => {
        if (!dayElement.dataset.date) return;

        const dayDate = new Date(dayElement.dataset.date);
        dayDate.setHours(0, 0, 0, 0);

        dayElement.classList.remove('start-date', 'end-date', 'in-range');

        if (startDate && dayDate.getTime() === startDate.getTime()) {
          dayElement.classList.add('start-date');
        }

        if (endDate && dayDate.getTime() === endDate.getTime()) {
          dayElement.classList.add('end-date');
        }

        if (startDate && endDate && dayDate > startDate && dayDate < endDate) {
          dayElement.classList.add('in-range');
        }
      });
    }

    function closePicker() {
      // Could trigger callback to parent
      console.log('Picker closed');
    }

    function confirmSelection() {
      if (startDate && endDate) {
        const result = {
          start: startDate,
          end: endDate,
          days: Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1
        };
        console.log('Confirmed:', result);
        alert(`已选择：${result.start.toLocaleDateString()} 至 ${result.end.toLocaleDateString()}\n共 ${result.days} 天`);
      }
    }

    // Initialize
    generateCalendar();
  </script>
</body>
</html>
