<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>旅途账本 — 首页</title>
<style>
:root {
  --bg: #F2F2F5;
  --surface: #FFFFFF;
  --fg: #1D1D1F;
  --fg-2: #6E7179;
  --muted: #A0A4AE;
  --border: #E5E5EA;
  --primary: #2D8B7A;
  --primary-light: #E6F3F0;
  --primary-dark: #1F6B5D;
  --price: #E05A38;
  --price-light: #FDF0EC;
  --success: #34A853;
  --success-bg: #E6F4EA;
  --warning: #E8A020;
  --warning-bg: #FEF7E0;
  --danger: #D93025;
  --danger-bg: #FCE8E6;
  --shadow-s: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-m: 0 2px 8px rgba(0,0,0,0.07);
  --shadow-l: 0 8px 24px rgba(0,0,0,0.09);
  --r-xs: 6px;
  --r-s: 8px;
  --r-m: 12px;
  --r-l: 16px;
  --r-xl: 20px;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.phone-frame {
  width: 393px;
  height: 852px;
  background: #000;
  border-radius: 50px;
  padding: 12px;
  position: relative;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
}

.phone-screen {
  width: 100%;
  height: 100%;
  background: var(--bg);
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

.dynamic-island {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 126px;
  height: 36px;
  background: #000;
  border-radius: 20px;
  z-index: 100;
}

.status-bar {
  height: 54px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 28px 6px;
  font-size: 15px;
  font-weight: 600;
  color: var(--fg);
  flex-shrink: 0;
}

.status-bar .time { letter-spacing: 0.02em; font-size: 16px; }
.status-bar .right { display: flex; align-items: center; gap: 5px; }

.content {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 100px;
  -webkit-overflow-scrolling: touch;
}
.content::-webkit-scrollbar { display: none; }

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 4px 16px;
}

.header-left h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--fg);
  letter-spacing: -0.03em;
}

.header-left p {
  font-size: 13px;
  color: var(--fg-2);
  margin-top: 1px;
  font-weight: 400;
}

.header-right { display: flex; gap: 8px; }

.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--surface);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-s);
  cursor: pointer;
  color: var(--fg-2);
  position: relative;
}

.icon-btn svg { width: 18px; height: 18px; }

.notif-badge {
  position: absolute;
  top: -3px; right: -3px;
  min-width: 18px; height: 18px; border-radius: 9px;
  background: #E05A38; color: #fff; font-size: 10px; font-weight: 700;
  display: none; align-items: center; justify-content: center;
  padding: 0 5px;
}

/* Trip Card */
.trip-card {
  background: linear-gradient(145deg, #1F6B5D 0%, #2D8B7A 40%, #3DA392 100%);
  border-radius: var(--r-xl);
  padding: 20px;
  color: #fff;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}

.trip-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 18px;
  position: relative;
  z-index: 1;
}

.trip-name {
  font-size: 19px;
  font-weight: 700;
  letter-spacing: -0.01em;
  max-width: 220px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.trip-date {
  font-size: 12px;
  opacity: 0.75;
  margin-top: 4px;
  font-weight: 400;
}

.trip-badge {
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 6px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  white-space: nowrap;
  flex-shrink: 0;
  text-align: center;
  line-height: 1.35;
}

.trip-badge .day-num {
  display: block;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.trip-badge .day-date {
  display: block;
  font-size: 10px;
  font-weight: 500;
  opacity: 0.85;
  margin-top: 1px;
  letter-spacing: 0;
}

.trip-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  position: relative;
  z-index: 1;
}

.trip-stat { text-align: center; }
.trip-stat:first-child { text-align: left; }
.trip-stat:last-child { text-align: right; }

.trip-stat-label {
  font-size: 11px;
  opacity: 0.7;
  margin-bottom: 3px;
  font-weight: 400;
}

.trip-stat-value {
  font-size: 21px;
  font-weight: 700;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}

.trip-stat-value.sm { font-size: 17px; }

/* Budget */
.budget-section {
  background: var(--surface);
  border-radius: var(--r-l);
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-s);
}

.budget-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.budget-label { font-size: 14px; font-weight: 600; color: var(--fg); }
.budget-total { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }

.budget-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 8px;
}

.budget-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--primary);
  transition: width 0.6s ease;
}

.budget-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}

.budget-row .spent { color: var(--primary); font-weight: 600; }
.budget-row .remain { color: var(--success); font-weight: 500; }

/* Report Card */
.report-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(135deg, #264653 0%, #2D8B7A 100%);
  border-radius: var(--r-l);
  padding: 14px 16px;
  margin-bottom: 18px;
  text-decoration: none;
  box-shadow: var(--shadow-m);
  transition: transform 0.2s;
}

.report-card:active {
  transform: scale(0.98);
}

.report-icon {
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.2);
  border-radius: var(--r-m);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.report-icon svg {
  width: 20px;
  height: 20px;
  color: #fff;
}

.report-content {
  flex: 1;
}

.report-title {
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 2px;
}

.report-desc {
  font-size: 12px;
  color: rgba(255,255,255,0.8);
}

.report-arrow {
  width: 20px;
  height: 20px;
  color: rgba(255,255,255,0.8);
  flex-shrink: 0;
}

/* Quick Stats */
.quick-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 18px;
}

.stat-card {
  background: var(--surface);
  border-radius: var(--r-l);
  padding: 14px 16px;
  box-shadow: var(--shadow-s);
}

.stat-card-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.stat-icon {
  width: 30px;
  height: 30px;
  border-radius: var(--r-xs);
  display: flex;
  align-items: center;
  justify-content: center;
}

.stat-icon svg { width: 16px; height: 16px; }
.stat-icon.teal { background: var(--primary-light); color: var(--primary); }
.stat-icon.orange { background: var(--price-light); color: var(--price); }

.stat-card-label { font-size: 12px; color: var(--muted); }

.stat-card-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--fg);
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}

.stat-card-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

/* Section */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding: 0 2px;
}

.section-title { font-size: 16px; font-weight: 600; color: var(--fg); }

.section-link {
  font-size: 13px;
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 2px;
}

.section-link svg { width: 14px; height: 14px; }

/* Timeline */
.timeline { margin-bottom: 8px; }

.timeline-item {
  display: flex;
  gap: 12px;
  padding-bottom: 12px;
  position: relative;
}

.timeline-item:last-child { padding-bottom: 0; }

.timeline-line {
  position: absolute;
  left: 14px;
  top: 28px;
  bottom: 0;
  width: 1px;
  background: var(--border);
}

.timeline-item:last-child .timeline-line { display: none; }

.timeline-dot-wrap {
  width: 30px;
  height: 30px;
  border-radius: var(--r-s);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

.timeline-dot-wrap svg { width: 16px; height: 16px; }

.timeline-card {
  flex: 1;
  background: var(--surface);
  border-radius: var(--r-m);
  padding: 12px 14px;
  box-shadow: var(--shadow-s);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.timeline-left { flex: 1; min-width: 0; }

.timeline-desc {
  font-size: 14px;
  font-weight: 500;
  color: var(--fg);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.timeline-meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.timeline-right { text-align: right; flex-shrink: 0; margin-left: 8px; }

.timeline-amount {
  font-size: 16px;
  font-weight: 700;
  color: var(--price);
  font-variant-numeric: tabular-nums;
}

.timeline-per {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}

/* FAB */
.fab {
  position: absolute;
  bottom: 92px;
  right: 20px;
  width: 52px;
  height: 52px;
  border-radius: 26px;
  background: var(--primary);
  color: #fff;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(45,139,122,0.35);
  cursor: pointer;
  z-index: 50;
  transition: transform 0.15s, box-shadow 0.15s;
}

.fab:active { transform: scale(0.93); }
.fab svg { width: 24px; height: 24px; }

/* Tab Bar */
.tab-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 82px;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
  padding-top: 6px;
  z-index: 80;
}

.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  font-size: 10px;
  color: var(--muted);
  cursor: pointer;
  border: none;
  background: none;
  padding: 4px 16px;
  font-family: var(--font);
  position: relative;
}

.tab-item.active { color: var(--primary); }

.tab-item.active::before {
  content: '';
  position: absolute;
  top: -6px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 3px;
  border-radius: 2px;
  background: var(--primary);
}

.tab-item svg { width: 22px; height: 22px; }
.tab-label { font-weight: 500; }

.home-indicator {
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  width: 134px;
  height: 5px;
  background: var(--fg);
  border-radius: 3px;
  opacity: 0.2;
}

/* ═══════════════════════════════════════════════════
   NOTIFICATION PANEL — Redesigned rich cards
   ═══════════════════════════════════════════════════ */

.notif-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.35);
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
  border-radius: 40px;
  overflow: hidden;
}
.notif-overlay.open { opacity: 1; pointer-events: auto; }

.notif-panel {
  position: absolute;
  top: 0; right: 0;
  width: 300px; height: 100%;
  background: var(--surface);
  box-shadow: -8px 0 32px rgba(0,0,0,0.18);
  transform: translateX(100%);
  transition: transform 0.28s cubic-bezier(0.22, 0.61, 0.36, 1);
  display: flex; flex-direction: column;
  z-index: 1;
}
.notif-overlay.open .notif-panel { transform: translateX(0); }

.notif-panel-header {
  padding: 48px 18px 10px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.notif-panel-header h3 { font-size: 17px; font-weight: 700; color: var(--fg); }
.notif-header-actions { display: flex; gap: 8px; }
.notif-mark-all {
  font-size: 13px; color: var(--primary); font-weight: 500;
  background: var(--primary-light); border: none;
  cursor: pointer; padding: 5px 12px;
  border-radius: 12px; transition: opacity 0.15s;
  font-family: var(--font);
}
.notif-mark-all:active { opacity: 0.7; }
.notif-clear-all {
  font-size: 13px; color: var(--danger); font-weight: 500;
  background: var(--danger-bg); border: none;
  cursor: pointer; padding: 5px 12px;
  border-radius: 12px; transition: opacity 0.15s;
  font-family: var(--font);
}
.notif-clear-all:active { opacity: 0.7; }

/* ── Filter Tabs ── */
.notif-tabs {
  display: flex; gap: 8px;
  padding: 6px 18px 10px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0; overflow-x: auto;
}
.notif-tabs::-webkit-scrollbar { display: none; }
.notif-tab-btn {
  padding: 5px 14px; border-radius: 14px;
  font-size: 12px; font-weight: 500; white-space: nowrap;
  background: var(--bg); color: var(--fg-2);
  border: none; cursor: pointer;
  font-family: var(--font); transition: all 0.15s;
}
.notif-tab-btn.active { background: var(--primary); color: #fff; }
.notif-tab-btn .tab-count {
  margin-left: 3px; font-size: 10px; opacity: 0.7;
}

/* ── Rich Card ── */
.notif-card {
  padding: 14px 18px;
  border-bottom: 0.5px solid var(--border);
  cursor: pointer; transition: background 0.15s;
  position: relative;
}
.notif-card:active { background: var(--bg); }
.notif-card.unread { background: #F8FDFB; }

.notif-dot {
  position: absolute; left: 7px; top: 20px;
  width: 7px; height: 7px; border-radius: 50%; background: var(--primary);
  opacity: 0;
}
.notif-card.unread .notif-dot { opacity: 1; }

.notif-card-hd {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.notif-card-icon {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.notif-card-icon svg { width: 15px; height: 15px; }
.notif-card-title { font-size: 14px; font-weight: 600; color: var(--fg); flex: 1; }
.notif-card-time { font-size: 11px; color: var(--muted); flex-shrink: 0; text-align: right; line-height: 1.3; }
.notif-card-time .notif-abs-time { display: block; font-size: 11px; color: var(--fg-2); font-weight: 500; }
.notif-card-time .notif-rel-time { display: block; font-size: 10px; color: var(--muted); }

.notif-card-body { padding-left: 40px; }

/* ── Progress bar (budget / milestone) ── */
.notif-progress { }
.notif-progress-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 12px; color: var(--fg-2); margin-bottom: 6px;
}
.notif-pct { font-weight: 700; color: var(--fg); font-variant-numeric: tabular-nums; }
.notif-mini-bar {
  height: 4px; background: var(--border); border-radius: 2px;
  overflow: hidden; margin-bottom: 8px;
}
.notif-mini-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.notif-hint { font-size: 11px; color: var(--muted); line-height: 1.4; }

/* ── Stats row (daily report) ── */
.notif-stats {
  display: flex; gap: 16px; margin-bottom: 10px;
}
.notif-stat-item { text-align: center; }
.ns-val { display: block; font-size: 15px; font-weight: 700; color: var(--fg); font-variant-numeric: tabular-nums; }
.ns-label { display: block; font-size: 10px; color: var(--muted); margin-top: 1px; }

/* ── Category tags ── */
.notif-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
.notif-tag {
  padding: 3px 8px; border-radius: 6px;
  font-size: 11px; font-weight: 500; white-space: nowrap;
}

/* ── Expense preview ── */
.notif-expense {
  display: flex; align-items: center; gap: 10px;
}
.ne-icon {
  width: 34px; height: 34px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.ne-icon svg { width: 16px; height: 16px; }
.ne-info { flex: 1; min-width: 0; }
.ne-desc { display: block; font-size: 13px; font-weight: 500; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ne-meta { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }
.ne-amount { font-size: 16px; font-weight: 700; color: var(--price); font-variant-numeric: tabular-nums; flex-shrink: 0; }

/* ── Empty state ── */
.notif-empty {
  padding: 60px 20px; text-align: center;
  font-size: 14px; color: var(--muted);
}
.notif-empty svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: 0.25; }

/* ── Settlement items ── */
.notif-settle-item {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 0; border-bottom: 0.5px solid var(--border);
}
.notif-settle-item:last-child { border-bottom: none; }
.notif-settle-name { font-size: 13px; font-weight: 500; color: var(--fg); }
.notif-settle-arrow { font-size: 12px; color: var(--muted); flex-shrink: 0; }
.notif-settle-amount { font-size: 14px; font-weight: 700; color: var(--price); font-variant-numeric: tabular-nums; margin-left: auto; }
.notif-settle-total { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── Duplicate items ── */
.notif-dupe { display: flex; gap: 6px; }
.notif-dupe-item {
  flex: 1; background: var(--bg); border-radius: 8px; padding: 10px;
}
.notif-dupe-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
.notif-dupe-amount { font-size: 14px; font-weight: 700; color: var(--price); font-variant-numeric: tabular-nums; }
.notif-dupe-desc { font-size: 11px; color: var(--fg-2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.notif-dupe-time { font-size: 10px; color: var(--muted); margin-top: 2px; }
.notif-dupe-badges { display: flex; gap: 4px; margin-top: 6px; }
.notif-dupe-badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; background: #FFF8E1; color: #F57F17; }

/* ── Split pending ── */
.notif-split-members { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.notif-split-pill {
  padding: 3px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 500; background: #F3E5F5; color: #7B1FA2;
}
.notif-split-items { }
.notif-split-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0; border-bottom: 0.5px solid var(--border);
}
.notif-split-row:last-child { border-bottom: none; }
.notif-split-desc { flex: 1; font-size: 12px; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.notif-split-absent { font-size: 11px; color: var(--muted); flex-shrink: 0; }

/* ── Category overspend ── */
.notif-cat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.notif-cat-icon {
  width: 28px; height: 28px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.notif-cat-icon svg { width: 14px; height: 14px; }
.notif-cat-name { font-size: 14px; font-weight: 600; color: var(--fg); flex: 1; }
.notif-cat-pct { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
.notif-cat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── Daily avg overspend ── */
.notif-avg-compare { display: flex; gap: 12px; margin-bottom: 8px; }
.notif-avg-item { flex: 1; text-align: center; padding: 8px; background: var(--bg); border-radius: 8px; }
.notif-avg-label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 2px; }
.notif-avg-val { display: block; font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
.notif-avg-over { font-size: 11px; color: var(--danger); font-weight: 500; margin-bottom: 6px; }

/* ── Record reminder ── */
.notif-reminder-text { font-size: 13px; color: var(--fg-2); line-height: 1.5; }
.notif-reminder-count { font-size: 24px; font-weight: 700; color: var(--fg); margin-bottom: 2px; }
.notif-reminder-hint { font-size: 11px; color: var(--muted); margin-top: 6px; padding: 6px 10px; background: var(--bg); border-radius: 8px; }
</style>

<script src="../js/trip-data.js"></script>
<script>
(function () {
  var D = TripData;
  var curDay = D.getCurrentDayNumber();
  var totalDays = D.getTotalDays();
  var totalSpent = D.getTotalSpent(curDay);
  var todaySpent = D.getTodaySpent();
  var perPerson = D.getPerPersonAvg(curDay);
  var budget = D.trip.budget;
  var remain = budget - totalSpent;
  var rate = budget > 0 ? (totalSpent / budget * 100) : 0;
  var todayExps = D.getTodayExpenses();
  var memberCount = D.members.length;

  function participantLabel(pIds) {
    if (pIds.length === memberCount) return '全员参与';
    return pIds.map(function (id) { var m = D.getMemberById(id); return m ? m.name : ''; }).join('、');
  }

  function formatDateCN(dayNum) {
    var d = D.dayNumToDate(dayNum);
    var parts = d.split('-');
    return parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日';
  }

  var html = '';

  // Header
  html += '<div class="header">' +
    '<div class="header-left">' +
      '<h1>旅途账本</h1>' +
      '<p>' + D.trip.name + ' · Day ' + curDay + '</p>' +
    '</div>' +
    '<div class="header-right">' +
      '<button class="icon-btn" id="notification-btn" aria-label="通知" onclick="openNotifications()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span class="notif-badge" id="notifBadge"></span></button>' +
      '<button class="icon-btn" aria-label="设置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>' +
    '</div></div>';

  // Trip Card
  html += '<div class="trip-card"><div class="trip-header"><div>' +
    '<div class="trip-name">' + D.trip.name + '</div>' +
    '<div class="trip-date">' + D.formatDateShort(D.trip.startDate) + ' — ' + D.formatDateShort(D.trip.endDate) + ' · ' + memberCount + '人同行</div>' +
    '</div><div class="trip-badge"><span class="day-num">Day ' + curDay + '/' + totalDays + '</span><span class="day-date">' + formatDateCN(curDay) + '</span></div></div>' +
    '<div class="trip-stats">' +
      '<div class="trip-stat"><div class="trip-stat-label">总消费</div><div class="trip-stat-value">' + D.formatMoney(totalSpent) + '</div></div>' +
      '<div class="trip-stat"><div class="trip-stat-label">人均</div><div class="trip-stat-value sm">' + D.formatMoney(perPerson) + '</div></div>' +
      '<div class="trip-stat"><div class="trip-stat-label">今日</div><div class="trip-stat-value sm">' + D.formatMoney(todaySpent) + '</div></div>' +
    '</div></div>';

  // Budget
  html += '<div class="budget-section"><div class="budget-top">' +
    '<span class="budget-label">预算执行</span><span class="budget-total">' + D.formatMoney(budget) + '</span></div>' +
    '<div class="budget-bar"><div class="budget-fill" style="width:' + Math.min(rate, 100).toFixed(1) + '%"></div></div>' +
    '<div class="budget-row"><span>已花 <span class="spent">' + D.formatMoney(totalSpent) + '</span></span>' +
    '<span>剩余 <span class="remain">' + D.formatMoney(Math.max(0, remain)) + '</span></span></div></div>';

  // Report Card
  html += '<a href="04-summary.html" class="report-card">' +
    '<div class="report-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>' +
    '<div class="report-content"><div class="report-title">查看旅行报告</div><div class="report-desc">消费总结 · 人均分析 · 导出分享</div></div>' +
    '<svg class="report-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></a>';

  // Quick Stats (from dashboardMetrics config)
  var metrics = D.dashboardMetrics;
  if (metrics.length > 0) {
    html += '<div class="quick-stats">';
    metrics.forEach(function (m) {
      var value = '', sub = '', iconClass = 'teal', iconSvg = '';
      switch (m.id) {
        case 'todayCount':
          value = todayExps.length + '笔';
          var yesterdayExps = D.getExpensesForDay(curDay - 1);
          sub = yesterdayExps.length > 0 ? '较昨日 ' + (todayExps.length >= yesterdayExps.length ? '+' : '') + (todayExps.length - yesterdayExps.length) + '笔' : '';
          iconClass = 'teal';
          iconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>';
          break;
        case 'pendingSplit':
          var pending = todayExps.filter(function (e) { return e.p.length < memberCount; }).length;
          value = pending + '笔';
          sub = '涉及' + memberCount + '人';
          iconClass = 'orange';
          iconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>';
          break;
        case 'todaySpent':
          value = D.formatMoney(todaySpent);
          sub = 'Day ' + curDay;
          iconClass = 'orange';
          iconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>';
          break;
        case 'perPersonAvg':
          value = D.formatMoney(perPerson);
          sub = memberCount + '人';
          iconClass = 'teal';
          iconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>';
          break;
        case 'budgetRate':
          value = rate.toFixed(1) + '%';
          sub = rate <= 100 ? '预算内' : '已超支';
          iconClass = rate <= 100 ? 'teal' : 'orange';
          iconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>';
          break;
        case 'remainBudget':
          value = D.formatMoney(Math.max(0, remain));
          sub = '预算 ' + D.formatMoney(budget);
          iconClass = remain > 0 ? 'teal' : 'orange';
          iconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
          break;
        case 'totalCount':
          var allExps = D.expenses.filter(function (e) { return D.dayOfTrip(e.date) <= curDay; });
          value = allExps.length + '笔';
          sub = curDay + '天累计';
          iconClass = 'teal';
          iconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
          break;
        default:
          value = '--';
          sub = '';
          iconClass = 'teal';
          iconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/></svg>';
      }
      html += '<div class="stat-card"><div class="stat-card-top"><div class="stat-icon ' + iconClass + '">' + iconSvg + '</div>' +
        '<span class="stat-card-label">' + (m.label || m.id) + '</span></div>' +
        '<div class="stat-card-value">' + value + '</div>' +
        (sub ? '<div class="stat-card-sub">' + sub + '</div>' : '') +
        '</div>';
    });
    html += '</div>';
  }

  // Today
  html += '<div class="section-header"><span class="section-title">今日消费</span>' +
    '<a href="#" class="section-link">查看全部<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></a></div>';

  html += '<div class="timeline">';
  todayExps.forEach(function (exp, idx) {
    var cat = D.getCategoryById(exp.cat);
    var isLast = idx === todayExps.length - 1;
    html += '<div class="timeline-item">' +
      (isLast ? '' : '<div class="timeline-line"></div>') +
      '<div class="timeline-dot-wrap" style="background:' + (cat ? cat.bgColor : '#F5F5F5') + ';color:' + (cat ? cat.color : '#6E7179') + '">' + D.getIcon(exp.cat) + '</div>' +
      '<div class="timeline-card"><div class="timeline-left">' +
        '<div class="timeline-desc">' + exp.desc + '</div>' +
        '<div class="timeline-meta">' + exp.time + ' · ' + participantLabel(exp.p) + '</div>' +
      '</div><div class="timeline-right">' +
        '<div class="timeline-amount">' + D.formatMoney(exp.amount) + '</div>' +
        '<div class="timeline-per">人均 ' + D.formatMoney(Math.round(exp.amount / exp.p.length)) + '</div>' +
      '</div></div></div>';
  });
  html += '</div>';

  document.getElementById('mainContent').innerHTML = html;

  // ═══════════════════════════════════════════════════
  // NOTIFICATION SYSTEM — Rich cards + filter tabs
  // ═══════════════════════════════════════════════════

  var currentFilter = 'all';

  function fmtAgo(ts) {
    var delta = Date.now() - new Date(ts).getTime();
    if (delta < 60000) return '刚刚';
    if (delta < 3600000) return Math.floor(delta / 60000) + '分钟前';
    if (delta < 86400000) return Math.floor(delta / 3600000) + '小时前';
    return Math.floor(delta / 86400000) + '天前';
  }

  function fmtTime(ts) {
    var d = new Date(ts);
    var h = d.getHours().toString().padStart(2, '0');
    var m = d.getMinutes().toString().padStart(2, '0');
    return h + ':' + m;
  }

  // Icon SVGs per notification type
  function getNotifIconSvg(type, pct) {
    switch (type) {
      case 'budget_alert':
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
      case 'daily_report':
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
      case 'abnormal_spending':
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
      case 'trip_milestone':
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      case 'category_overspend':
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 118 2.83"/><path d="M22 12A10 10 0 0012 2v10z"/></svg>';
      case 'daily_avg_overspend':
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>';
      case 'record_reminder':
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
      case 'split_pending':
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>';
      case 'settlement_reminder':
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>';
      case 'duplicate_expense':
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
      default:
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/></svg>';
    }
  }

  // Icon background color per type
  function getNotifBg(type) {
    switch (type) {
      case 'budget_alert': return '#FDF0EC';
      case 'daily_report': return '#E3F2FD';
      case 'abnormal_spending': return '#FFF8E1';
      case 'trip_milestone': return '#E6F3F0';
      case 'category_overspend': return '#FFF3E0';
      case 'daily_avg_overspend': return '#FCE4EC';
      case 'record_reminder': return '#E3F2FD';
      case 'split_pending': return '#F3E5F5';
      case 'settlement_reminder': return '#E6F3F0';
      case 'duplicate_expense': return '#FFF8E1';
      default: return '#F5F5F5';
    }
  }

  function getNotifFg(type) {
    switch (type) {
      case 'budget_alert': return 'var(--price)';
      case 'daily_report': return '#1565C0';
      case 'abnormal_spending': return 'var(--warning)';
      case 'trip_milestone': return 'var(--primary)';
      case 'category_overspend': return '#E65100';
      case 'daily_avg_overspend': return '#C62828';
      case 'record_reminder': return '#1565C0';
      case 'split_pending': return '#7B1FA2';
      case 'settlement_reminder': return 'var(--primary)';
      case 'duplicate_expense': return '#F57F17';
      default: return 'var(--fg-2)';
    }
  }

  window.openNotifications = function () {
    D.generateNotifications();
    currentFilter = 'all';
    syncTabUI();
    renderNotifications();
    document.getElementById('notifOverlay').classList.add('open');
  };

  window.closeNotifications = function (e) {
    if (e && e.target !== document.getElementById('notifOverlay')) return;
    document.getElementById('notifOverlay').classList.remove('open');
  };

  window.readNotif = function (id) {
    D.markNotificationRead(id);
    renderNotifications();
  };

  window.markAllRead = function () {
    D.markAllNotificationsRead();
    renderNotifications();
  };

  window.clearAllNotifications = function () {
    D.clearNotifications();
    renderNotifications();
  };

  // Build a single rich card HTML per notification
  function buildCard(n) {
    var cls = n.read === false ? 'notif-card unread' : 'notif-card';
    var bg = getNotifBg(n.type);
    var fg = getNotifFg(n.type);
    var icon = getNotifIconSvg(n.type);

    var h = '<div class="' + cls + '" onclick="readNotif(\'' + n.id + '\')">';
    h += '<span class="notif-dot"></span>';

    // Header
    h += '<div class="notif-card-hd">';
    h += '<span class="notif-card-icon" style="background:' + bg + ';color:' + fg + '">' + icon + '</span>';
    h += '<span class="notif-card-title">' + n.title + '</span>';
    h += '<span class="notif-card-time"><span class="notif-abs-time">' + fmtTime(n.time) + '</span><span class="notif-rel-time">' + fmtAgo(n.time) + '</span></span>';
    h += '</div>';

    // Body — type-specific
    if (n.data) {
      h += '<div class="notif-card-body">';

      if (n.type === 'budget_alert') {
        var d = n.data;
        var barColor = d.pct >= 100 ? 'var(--danger)' : d.pct >= 90 ? 'var(--warning)' : 'var(--primary)';
        h += '<div class="notif-progress">';
        h += '<div class="notif-progress-row"><span>' + D.formatMoney(d.spent) + ' / ' + D.formatMoney(d.budget) + '</span><span class="notif-pct" style="color:' + barColor + '">' + d.pct + '%</span></div>';
        h += '<div class="notif-mini-bar"><div class="notif-mini-fill" style="width:' + Math.min(d.pct, 100) + '%;background:' + barColor + '"></div></div>';
        if (d.over && d.over > 0) {
          h += '<div class="notif-hint" style="color:var(--danger)">已超支 ' + D.formatMoney(d.over) + '，请控制后续支出</div>';
        } else if (d.dailyBudget && d.dailyBudget > 0) {
          h += '<div class="notif-hint">建议剩余 ' + d.remainingDays + ' 天日均不超过 ' + D.formatMoney(d.dailyBudget) + '</div>';
        }
        h += '</div>';

      } else if (n.type === 'daily_report') {
        var d = n.data;
        h += '<div class="notif-stats">';
        h += '<div class="notif-stat-item"><span class="ns-val">' + D.formatMoneyNoSymbol(d.total) + '</span><span class="ns-label">总消费</span></div>';
        h += '<div class="notif-stat-item"><span class="ns-val">' + d.count + '笔</span><span class="ns-label">笔数</span></div>';
        h += '<div class="notif-stat-item"><span class="ns-val">' + D.formatMoneyNoSymbol(d.perPerson) + '</span><span class="ns-label">人均</span></div>';
        h += '</div>';
        if (d.topCats && d.topCats.length > 0) {
          h += '<div class="notif-tags">';
          d.topCats.forEach(function (tc) {
            var cat = D.getCategoryById(tc.cat);
            var cBg = cat ? cat.bgColor : '#F5F5F5';
            var cFg = cat ? cat.color : '#6E7179';
            h += '<span class="notif-tag" style="background:' + cBg + ';color:' + cFg + '">' + (cat ? cat.name : tc.cat) + ' ' + D.formatMoneyNoSymbol(tc.amount) + '</span>';
          });
          h += '</div>';
        }
        if (d.vsYesterday !== null && d.vsYesterday !== 0) {
          var sign = d.vsYesterday > 0 ? '+' : '';
          h += '<div class="notif-hint">较昨日 ' + sign + D.formatMoney(d.vsYesterday) + '</div>';
        }

      } else if (n.type === 'abnormal_spending') {
        var d = n.data;
        var cat = D.getCategoryById(d.cat);
        h += '<div class="notif-expense">';
        h += '<span class="ne-icon" style="background:' + (cat ? cat.bgColor : '#FFF3E0') + ';color:' + (cat ? cat.color : '#E65100') + '">' + D.getIcon(d.cat) + '</span>';
        h += '<div class="ne-info"><span class="ne-desc">' + (d.catName ? d.catName + ' · ' : '') + d.desc + '</span>';
        h += '<span class="ne-meta">是均值 ¥' + D.formatMoneyNoSymbol(d.avgAmount) + ' 的 ' + (d.amount / Math.max(1, d.avgAmount)).toFixed(1) + ' 倍</span></div>';
        h += '<span class="ne-amount">' + D.formatMoneyNoSymbol(d.amount) + '</span>';
        h += '</div>';

      } else if (n.type === 'trip_milestone') {
        var d = n.data;
        h += '<div class="notif-progress">';
        h += '<div class="notif-progress-row"><span>Day ' + d.day + ' / ' + d.totalDays + '</span><span class="notif-pct">' + d.pct + '%</span></div>';
        h += '<div class="notif-mini-bar"><div class="notif-mini-fill" style="width:' + d.pct + '%;background:var(--primary)"></div></div>';
        h += '<div class="notif-hint">累计消费 ' + D.formatMoney(d.totalSpent) + (d.remain > 0 ? ' · 剩余预算 ' + D.formatMoney(d.remain) : '') + '</div>';
        h += '</div>';

      } else if (n.type === 'category_overspend') {
        var d = n.data;
        var cat = D.getCategoryById(d.catId);
        var catBg = cat ? cat.bgColor : '#FFF3E0';
        var catFg = cat ? cat.color : '#E65100';
        h += '<div class="notif-cat-row">';
        h += '<span class="notif-cat-icon" style="background:' + catBg + ';color:' + catFg + '">' + D.getIcon(d.catId) + '</span>';
        h += '<span class="notif-cat-name">' + d.catName + '</span>';
        h += '<span class="notif-cat-pct" style="color:' + catFg + '">' + d.pct + '%</span>';
        h += '</div>';
        h += '<div class="notif-mini-bar"><div class="notif-mini-fill" style="width:' + Math.min(d.pct, 100) + '%;background:' + catFg + '"></div></div>';
        h += '<div class="notif-cat-sub">' + d.count + '笔 · 共 ¥' + D.formatMoneyNoSymbol(d.total) + ' · 均笔 ¥' + D.formatMoneyNoSymbol(d.avgPerExpense) + '</div>';

      } else if (n.type === 'daily_avg_overspend') {
        var d = n.data;
        h += '<div class="notif-avg-compare">';
        h += '<div class="notif-avg-item"><span class="notif-avg-label">实际日均</span><span class="notif-avg-val" style="color:var(--price)">¥' + D.formatMoneyNoSymbol(d.actualDailyAvg) + '</span></div>';
        h += '<div class="notif-avg-item"><span class="notif-avg-label">预算日均</span><span class="notif-avg-val" style="color:var(--primary)">¥' + D.formatMoneyNoSymbol(d.budgetDailyAvg) + '</span></div>';
        h += '</div>';
        h += '<div class="notif-avg-over">超出 ¥' + D.formatMoneyNoSymbol(d.overAmount) + ' / 天</div>';
        if (d.adjustedDailyBudget > 0) {
          h += '<div class="notif-hint">建议剩余每天不超过 ¥' + D.formatMoneyNoSymbol(d.adjustedDailyBudget) + '</div>';
        }

      } else if (n.type === 'record_reminder') {
        var d = n.data;
        h += '<div class="notif-reminder-text">';
        if (d.todayCount === 0) {
          h += '今天还没有消费记录';
        } else {
          h += '今天只记了 <span class="notif-reminder-count">' + d.todayCount + '</span> 笔';
        }
        h += '</div>';
        h += '<div class="notif-reminder-hint">' + d.hint + '</div>';

      } else if (n.type === 'split_pending') {
        var d = n.data;
        h += '<div class="notif-split-members">';
        d.absentMembers.forEach(function (name) {
          h += '<span class="notif-split-pill">' + name + '</span>';
        });
        h += '</div>';
        h += '<div class="notif-split-items">';
        d.recentItems.forEach(function (item) {
          h += '<div class="notif-split-row">';
          h += '<span class="notif-split-desc">' + item.desc + '</span>';
          h += '<span class="ne-amount" style="font-size:13px">¥' + D.formatMoneyNoSymbol(item.amount) + '</span>';
          h += '</div>';
        });
        h += '</div>';
        h += '<div class="notif-hint">共 ' + d.pendingCount + ' 笔待确认</div>';

      } else if (n.type === 'settlement_reminder') {
        var d = n.data;
        d.settlements.forEach(function (s) {
          h += '<div class="notif-settle-item">';
          h += '<span class="notif-settle-name">' + s.from + '</span>';
          h += '<span class="notif-settle-arrow">→</span>';
          h += '<span class="notif-settle-name">' + s.to + '</span>';
          h += '<span class="notif-settle-amount">¥' + D.formatMoneyNoSymbol(s.amount) + '</span>';
          h += '</div>';
        });
        h += '<div class="notif-settle-total">待结算总额 ¥' + D.formatMoneyNoSymbol(d.totalUnsettled) + '</div>';

      } else if (n.type === 'duplicate_expense') {
        var d = n.data;
        h += '<div class="notif-dupe">';
        h += '<div class="notif-dupe-item">';
        h += '<div class="notif-dupe-label">记录 1</div>';
        h += '<div class="notif-dupe-amount">¥' + D.formatMoneyNoSymbol(d.expense1.amount) + '</div>';
        h += '<div class="notif-dupe-desc">' + d.expense1.desc + '</div>';
        h += '<div class="notif-dupe-time">' + d.expense1.time + '</div>';
        h += '</div>';
        h += '<div class="notif-dupe-item">';
        h += '<div class="notif-dupe-label">记录 2</div>';
        h += '<div class="notif-dupe-amount">¥' + D.formatMoneyNoSymbol(d.expense2.amount) + '</div>';
        h += '<div class="notif-dupe-desc">' + d.expense2.desc + '</div>';
        h += '<div class="notif-dupe-time">' + d.expense2.time + '</div>';
        h += '</div>';
        h += '</div>';
        h += '<div class="notif-dupe-badges">';
        if (d.sameAmount) h += '<span class="notif-dupe-badge">同金额</span>';
        if (d.sameCategory) h += '<span class="notif-dupe-badge">同分类</span>';
        h += '</div>';
      }

      h += '</div>'; // body
    }

    h += '</div>'; // card
    return h;
  }

  function syncTabUI() {
    var tabs = document.getElementById('notifTabs');
    if (!tabs) return;
    tabs.querySelectorAll('.notif-tab-btn').forEach(function (btn) {
      btn.classList.toggle('active', btn.getAttribute('data-filter') === currentFilter);
    });
  }

  function renderNotifications() {
    var list = D.getNotifications();
    var container = document.getElementById('notifList');
    var badge = document.getElementById('notifBadge');
    if (!container) return;

    var unread = 0;
    var html = '';

    if (list.length === 0) {
      html = '<div class="notif-empty"><svg viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><div>暂无通知</div></div>';
    } else {
      for (var i = 0; i < list.length; i++) {
        var n = list[i];
        if (n.read === false) unread++;
        if (currentFilter !== 'all' && n.category !== currentFilter) continue;
        html += buildCard(n);
      }
      // If filter returns empty
      if (html === '') {
        html = '<div class="notif-empty"><svg viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><div>该分类暂无通知</div></div>';
      }
    }

    container.innerHTML = html;

    if (badge) {
      if (unread > 0) {
        badge.textContent = unread > 99 ? '99+' : unread;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    }
  }

  // Filter tab clicks
  (function bindTabs() {
    var tabs = document.getElementById('notifTabs');
    if (!tabs) return;
    tabs.addEventListener('click', function (e) {
      var btn = e.target.closest('.notif-tab-btn');
      if (!btn) return;
      currentFilter = btn.getAttribute('data-filter');
      syncTabUI();
      renderNotifications();
    });
  })();

  // Initial badge
  renderNotifications();

})();
</script>

</body>
</html>
